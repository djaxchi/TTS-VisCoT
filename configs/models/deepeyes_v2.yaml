# DeepEyesV2 model configuration
# Qwen2.5-VL-7B fine-tuned via SFT + GRPO RL for agentic visual reasoning.
#
# Checkpoints:
#   RL-tuned (recommended): honglyhly/DeepEyesV2_7B_1031
#   SFT only:               honglyhly/DeepEyesV2_7B_SFT_1031

model: deepeyes_v2

# HuggingFace model ID or local checkpoint path.
model_id: honglyhly/DeepEyesV2_7B_1031

# Maximum agentic loop turns before giving up (matches inference_demo.py).
max_turns: 10

# Set to true to load in 8-bit (requires bitsandbytes) — fits on 16 GB VRAM.
# Set to false for full precision on 24 GB+ VRAM.
load_in_8bit: true

# Matches inference_demo.py defaults exactly.
temperature: 0.0
max_new_tokens: 20480
