name: tts_scaling

seed: 42

defaults:
  - /datasets: treebench
  - /models: viscot

dataset:
  _target_: treebench
  split: test
  max_samples: null

model:
  _target_: viscot
  temperature: 0.0
  max_new_tokens: 512

method: tts_scaling

# Augmentation config
augmentation:
  image_sets:
    - SET_A
    - SET_B
  text_paraphrases: 3
  seed: ${seed}

# Sampling config (used by tts_sampling method)
sampling:
  n: 8
  temperature: 0.7

output_dir: results/${name}/
